<html>

<head>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            grid-auto-rows: 1fr;
            /* Ensures uniform height */
            grid-auto-flow: row;
            /* Forces wrapping into new rows */
            width: 100vw;
            height: 100vh;
        }

        .item {
            background: lightblue;
            border: 1px solid #000;
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>


</body>

</html>
